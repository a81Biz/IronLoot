services:
  # ===========================================
  # Nginx Reverse Proxy (subdomains)
  # localhost        → base:5174  (web/ legacy retirado)
  # api.localhost    → api:3000
  # admin.localhost  → admin:3001
  # base.localhost   → base:5174  (PT-015 activated)
  # client.localhost → client:5175 (PT-015 activated)
  # ===========================================
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    container_name: ironloot-nginx
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
      base:
        condition: service_started
      client:
        condition: service_started
    networks:
      - ironloot-network
    restart: unless-stopped

  # ===========================================
  # Iron Loot Admin Panel (NestJS SSR)
  # ===========================================
  admin:
    build:
      context: ./src/admin
      dockerfile: Dockerfile.dev
    container_name: ironloot-admin
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    environment:
      - NODE_ENV=development
      - ADMIN_PORT=3001
      - ADMIN_API_URL=http://api:3000
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-admin-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:-admin-dev-secret-change-me}
    volumes:
      - ./src/admin/src:/app/src
      - ./src/admin/views:/app/views
      - ./src/admin/public:/app/public
      - ./src/admin/package.json:/app/package.json
      - ./src/admin/tsconfig.json:/app/tsconfig.json
      - ./src/admin/nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ironloot-network
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ===========================================
  # Iron Loot API (NestJS)
  # ===========================================
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile.dev
    container_name: ironloot-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-ironloot}:${DB_PASSWORD:-ironloot_dev}@db:5432/${DB_NAME:-ironloot_db}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-debug}

      - TRACE_ENABLED=true
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-admin-key}
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USER=test
      - MAIL_PASSWORD=test
      - MAIL_FROM="Iron Loot <noreply@ironloot.com>"
      - BASE_URL=http://base.localhost
      - JWT_SECRET=${JWT_SECRET:-change-me-min-32-chars}
    # Load additional env vars from project .env into the container
    env_file:
      - ./src/api/.env
    volumes:
      - ./src/api/src:/app/src
      - ./src/api/prisma:/app/prisma
      - ./src/api/test:/app/test
      - ./src/api/package.json:/app/package.json
      - ./src/api/tsconfig.json:/app/tsconfig.json
      - ./src/api/nest-cli.json:/app/nest-cli.json
      # @ironloot/core workspace package — mounted so the entrypoint can symlink it
      - ./src/packages/core:/packages/core
      # Exclude node_modules to use container's version
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ironloot-network
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: ironloot-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-ironloot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ironloot_dev}
      POSTGRES_DB: ${DB_NAME:-ironloot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/api/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - ironloot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ironloot} -d ${DB_NAME:-ironloot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ===========================================
  # Redis (Cache & Sessions)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ironloot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ironloot-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ===========================================
  # Mailhog (Local Email Testing)
  # ===========================================
  mailhog:
    image: mailhog/mailhog
    container_name: ironloot-mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - ironloot-network
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ===========================================
  # pgAdmin (Database Administration) - Optional
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ironloot-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ironloot.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ironloot-network
    depends_on:
      - db
    profiles:
      - tools
    restart: unless-stopped

  # ===========================================
  # IronLoot BASE — Public Site (PT-015 activated)
  # Accessible at: http://base.localhost
  # ===========================================
  base:
    build:
      context: ./src/apps/base
      dockerfile: Dockerfile.dev
    container_name: ironloot-base
    ports:
      - "${BASE_PORT:-5174}:5174"
    environment:
      - NODE_ENV=development
      - BASE_PORT=5174
      - API_URL=http://api:3000
      - CLIENT_URL=http://client.localhost
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.localhost}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-Lax}
    volumes:
      - ./src/apps/base/src:/app/src
      - ./src/apps/base/views:/app/views
      - ./src/apps/base/public:/app/public
      - ./src/apps/base/package.json:/app/package.json
      - ./src/apps/base/tsconfig.json:/app/tsconfig.json
      - ./src/apps/base/nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5174/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ironloot-network
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ===========================================
  # IronLoot CLIENT — Private Portal (PT-015 activated)
  # Accessible at: http://client.localhost
  # ===========================================
  client:
    build:
      context: ./src/apps/client
      dockerfile: Dockerfile.dev
    container_name: ironloot-client
    ports:
      - "${CLIENT_PORT:-5175}:5175"
    environment:
      - NODE_ENV=development
      - CLIENT_PORT=5175
      - API_URL=http://api:3000
      - BASE_URL=http://base.localhost
      - JWT_SECRET=${JWT_SECRET:-change-me-min-32-chars}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.localhost}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-Lax}
    volumes:
      - ./src/apps/client/src:/app/src
      - ./src/apps/client/views:/app/views
      - ./src/apps/client/public:/app/public
      - ./src/apps/client/package.json:/app/package.json
      - ./src/apps/client/tsconfig.json:/app/tsconfig.json
      - ./src/apps/client/nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5175/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ironloot-network
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

networks:
  ironloot-network:
    driver: bridge

volumes:
  postgres_data:
    name: ironloot_postgres_data
  redis_data:
    name: ironloot_redis_data
  pgadmin_data:
    name: ironloot_pgadmin_data

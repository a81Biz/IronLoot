events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # ─── localhost → Web frontend ──────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        location / {
            set $upstream http://web:5173;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    # ─── api.localhost → API backend ──────────────────────────────────────
    server {
        listen 80;
        server_name api.localhost;

        location / {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            client_max_body_size 10M;
        }
    }

    # ─── admin.localhost → Admin panel ────────────────────────────────────
    server {
        listen 80;
        server_name admin.localhost;

        location / {
            set $upstream http://admin:3001;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    # ─── base.localhost → BASE public site (PT-015 activated) ───────────
    server {
        listen 80;
        server_name base.localhost;

        location / {
            set $upstream http://base:5174;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout;
            error_page 502 503 504 = @base_unavailable;
        }

        location @base_unavailable {
            return 503 '{"error":"BASE service unavailable","service":"apps/base","port":5174}';
            add_header Content-Type application/json;
        }
    }

    # ─── client.localhost → CLIENT private portal (PT-015 activated) ────
    server {
        listen 80;
        server_name client.localhost;

        location / {
            set $upstream http://client:5175;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout;
            error_page 502 503 504 = @client_unavailable;
        }

        location @client_unavailable {
            return 503 '{"error":"CLIENT service unavailable","service":"apps/client","port":5175}';
            add_header Content-Type application/json;
        }
    }

    # ─── ironloot.local → Conmutación de tráfico (PT-025 Fase 7) ─────────
    # Tarea 16: Rutas privadas → CLIENT
    # Tarea 17: Todo lo demás → BASE (HTTP 301 permanente)
    # Activar: añadir "127.0.0.1 ironloot.local" en /etc/hosts del host
    server {
        listen 80;
        server_name ironloot.local;

        # Catálogo público — redirigir a BASE (debe ir ANTES que el bloque /auction)
        location ~ ^/auctions {
            return 301 http://base.ironloot.local$request_uri;
        }

        # Rutas privadas — redirigir a CLIENT
        # /auction/ cubre /auction/create y /auction/:id/edit (vendedor)
        location ~ ^/(dashboard|wallet|orders|my-bids|seller|auction/|profile|settings|payments|notifications|disputes|reputation|watchlist) {
            return 301 http://client.ironloot.local$request_uri;
        }

        # Rutas de auth — redirigir a BASE (login, register, recovery, etc.)
        location ~ ^/auth {
            return 301 http://base.ironloot.local$request_uri;
        }

        # Todo lo demás → BASE (sitio público)
        location / {
            return 301 http://base.ironloot.local$request_uri;
        }
    }

    # ─── localhost → Conmutación (dev-local: redirige web/ a base.localhost) ─
    # NOTA: Descomentar SOLO cuando se confirme el go-live en el entorno local.
    # Rollback: volver a comentar este bloque y descomentar el bloque original.
    #
    # server {
    #     listen 80;
    #     server_name localhost;
    #
    #     location ~ ^/(dashboard|wallet|orders|my-bids|seller|auction|profile|settings|payments|notifications|disputes|reputation|watchlist) {
    #         return 301 http://client.localhost$request_uri;
    #     }
    #
    #     location / {
    #         return 301 http://base.localhost$request_uri;
    #     }
    # }
}

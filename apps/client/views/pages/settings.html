{% extends "layouts/client.html" %}
{% block title %}Configuración — IronLoot{% endblock %}
{% block page_title %}Configuración{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-title">Notificaciones por email</div>
  <form id="settingsForm">
    <div class="form-group">
      <label><input type="checkbox" id="emailBids" {% if settings.emailOnBid %}checked{% endif %}> Notificar cuando me superan una oferta</label>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="emailWon" {% if settings.emailOnWin %}checked{% endif %}> Notificar cuando gano una subasta</label>
    </div>
    <button type="submit" class="btn btn-primary">Guardar preferencias</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ apiUrl }}';
document.getElementById('settingsForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  await fetch(API + '/api/v1/users/settings', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
    body: JSON.stringify({ emailOnBid: document.getElementById('emailBids').checked, emailOnWin: document.getElementById('emailWon').checked }),
  });
  alert('Preferencias guardadas.');
});
</script>
{% endblock %}

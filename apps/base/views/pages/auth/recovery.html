{% extends "layouts/base.html" %}
{% block title %}Recuperar contraseña — IronLoot{% endblock %}

{% block content %}
<div class="form-container">
  <h1 class="form-title">Recuperar contraseña</h1>
  <p style="text-align:center;color:#6c757d;margin-bottom:1.5rem;">Ingresa tu correo y te enviaremos instrucciones.</p>
  <form id="recoveryForm">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input class="form-control" type="email" id="email" name="email" required autocomplete="email">
    </div>
    <button type="submit" class="btn btn-primary form-submit">Enviar instrucciones</button>
    <div id="recoveryMsg" style="display:none;margin-top:.75rem;"></div>
  </form>
  <div class="form-footer"><a href="/auth/login">Volver a iniciar sesión</a></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '{{ apiUrl }}';
document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById('recoveryMsg');
  try {
    await fetch(API + '/api/v1/auth/forgot-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: e.target.email.value }),
    });
    msgEl.className = 'alert alert-success';
    msgEl.textContent = 'Si el correo existe, recibirás las instrucciones en unos minutos.';
    msgEl.style.display = 'block';
  } catch { msgEl.className = 'alert alert-error'; msgEl.textContent = 'Error de conexión.'; msgEl.style.display = 'block'; }
});
</script>
{% endblock %}

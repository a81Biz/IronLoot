{% extends "layouts/base.html" %}
{% block title %}Nueva contraseña — IronLoot{% endblock %}

{% block content %}
<div class="form-container">
  <h1 class="form-title">Nueva contraseña</h1>
  <form id="resetForm">
    <input type="hidden" id="token" value="{{ token }}">
    <div class="form-group">
      <label for="password">Nueva contraseña</label>
      <input class="form-control" type="password" id="password" name="password" required minlength="8">
    </div>
    <div class="form-group">
      <label for="confirm">Confirmar contraseña</label>
      <input class="form-control" type="password" id="confirm" name="confirm" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary form-submit">Cambiar contraseña</button>
    <div id="resetMsg" style="display:none;margin-top:.75rem;"></div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '{{ apiUrl }}';
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById('resetMsg');
  if (e.target.password.value !== e.target.confirm.value) {
    msgEl.className = 'alert alert-error'; msgEl.textContent = 'Las contraseñas no coinciden.'; msgEl.style.display = 'block'; return;
  }
  try {
    const res = await fetch(API + '/api/v1/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: document.getElementById('token').value, password: e.target.password.value }),
    });
    if (res.ok) { window.location.href = '/auth/login'; }
    else { const d = await res.json(); msgEl.className = 'alert alert-error'; msgEl.textContent = d.message || 'Error al cambiar.'; msgEl.style.display = 'block'; }
  } catch { msgEl.className = 'alert alert-error'; msgEl.textContent = 'Error de conexión.'; msgEl.style.display = 'block'; }
});
</script>
{% endblock %}

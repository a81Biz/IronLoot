{% extends "layouts/client.html" %}
{% block title %}Crear subasta — IronLoot{% endblock %}
{% block page_title %}Crear subasta{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <form id="createAuctionForm">
    <div class="form-group">
      <label for="title">Título del artículo</label>
      <input class="form-control" id="title" required placeholder="Ej: iPhone 15 Pro Max 256GB">
    </div>
    <div class="form-group">
      <label for="description">Descripción detallada</label>
      <textarea class="form-control" id="description" rows="4" required style="resize:vertical;" placeholder="Estado, características, accesorios incluidos…"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label for="startingPrice">Precio inicial (MXN)</label>
        <input class="form-control" type="number" id="startingPrice" min="1" step="0.01" required placeholder="500.00">
      </div>
      <div class="form-group">
        <label for="condition">Condición</label>
        <select class="form-control" id="condition">
          <option value="NEW">Nuevo</option>
          <option value="LIKE_NEW">Como nuevo</option>
          <option value="GOOD">Bueno</option>
          <option value="FAIR">Regular</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div class="form-group">
        <label for="startsAt">Inicio de subasta</label>
        <input class="form-control" type="datetime-local" id="startsAt" required>
      </div>
      <div class="form-group">
        <label for="endsAt">Fin de subasta</label>
        <input class="form-control" type="datetime-local" id="endsAt" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Crear subasta</button>
    <div id="createMsg" class="alert" style="display:none;margin-top:.75rem;"></div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ apiUrl }}';
document.getElementById('createAuctionForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById('createMsg');
  const body = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    startingPrice: parseFloat(document.getElementById('startingPrice').value),
    condition: document.getElementById('condition').value,
    startsAt: new Date(document.getElementById('startsAt').value).toISOString(),
    endsAt: new Date(document.getElementById('endsAt').value).toISOString(),
  };
  const res = await fetch(API + '/api/v1/auctions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
    body: JSON.stringify(body),
  });
  if (res.ok) { const d = await res.json(); window.location.href = '/seller/auctions'; }
  else { const d = await res.json(); msgEl.className = 'alert alert-error'; msgEl.textContent = d.message || 'Error al crear subasta.'; msgEl.style.display = 'block'; }
});
</script>
{% endblock %}

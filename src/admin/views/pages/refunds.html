{% extends "layouts/admin.html" %}
{% block title %}Reembolsos — IronLoot Admin{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="h3 mb-0">Reembolsos</h1>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createRefundModal">+ Crear reembolso</button>
</div>

<div class="card">
  <div class="card-header d-flex gap-2">
    <select id="statusFilter" class="form-select form-select-sm" style="max-width:160px;">
      <option value="">Todos los estados</option>
      <option value="PENDING_REFUND">Pendiente</option>
      <option value="PROCESSING">Procesando</option>
      <option value="COMPLETED">Completado</option>
      <option value="FAILED">Fallido</option>
    </select>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadRefunds()">Filtrar</button>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead><tr><th>ID</th><th>Orden</th><th>Monto</th><th>Estado</th><th>Iniciado por</th><th>Fecha</th><th>Acciones</th></tr></thead>
        <tbody id="refundsTable">
          <tr><td colspan="7" class="text-center py-4 text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create Refund Modal -->
<div class="modal fade" id="createRefundModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Crear reembolso</h5></div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">ID de la orden</label><input class="form-control" id="refundOrderId" placeholder="UUID de la orden"></div>
        <div class="mb-3"><label class="form-label">Monto (MXN)</label><input class="form-control" type="number" id="refundAmount" min="0.01" step="0.01"></div>
        <div class="mb-3"><label class="form-label">Motivo</label><textarea class="form-control" id="refundReason" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" onclick="createRefund()">Crear reembolso</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1/admin';
async function loadRefunds() {
  const status = document.getElementById('statusFilter').value;
  const url = status ? `${API}/refunds?status=${status}` : `${API}/refunds`;
  const data = await (await fetch(url)).json();
  const tbody = document.getElementById('refundsTable');
  if (!data.items?.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">Sin reembolsos.</td></tr>'; return; }
  tbody.innerHTML = data.items.map(r => `
    <tr>
      <td><code>${r.id.slice(0,8)}…</code></td>
      <td><code>${r.orderId.slice(0,8)}…</code></td>
      <td>MXN ${r.amount}</td>
      <td><span class="badge bg-secondary">${r.status}</span></td>
      <td>${r.initiatedBy}</td>
      <td>${r.createdAt.slice(0,10)}</td>
      <td>
        ${r.status === 'PENDING_REFUND' ? `<button class="btn btn-xs btn-success" onclick="updateStatus('${r.id}','PROCESSING')">Procesar</button>` : ''}
        ${r.status === 'PROCESSING' ? `<button class="btn btn-xs btn-primary" onclick="updateStatus('${r.id}','COMPLETED')">Completar</button>` : ''}
      </td>
    </tr>`).join('');
}
async function createRefund() {
  await fetch(`${API}/refunds`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ orderId: document.getElementById('refundOrderId').value, amount: parseFloat(document.getElementById('refundAmount').value), reason: document.getElementById('refundReason').value }) });
  bootstrap.Modal.getInstance(document.getElementById('createRefundModal')).hide();
  loadRefunds();
}
async function updateStatus(id, status) {
  await fetch(`${API}/refunds/${id}/status`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
  loadRefunds();
}
loadRefunds();
</script>
{% endblock %}

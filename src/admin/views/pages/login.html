<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <span class="material-symbols-outlined login-icon">bolt</span>
        <h1>Iron Loot</h1>
        <p>Panel de Administración</p>
      </div>

      {% if error %}
      <div class="alert alert-error">
        <span class="material-symbols-outlined">error</span>
        {{ error }}
      </div>
      {% endif %}

      <form action="/login" method="POST" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">person</span>
            <input type="text" id="username" name="username" placeholder="admin" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        {% if requiresTotp %}
        <div class="form-group">
          <label for="totp">Código TOTP</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">phonelink_lock</span>
            <input type="text" id="totp" name="totp" placeholder="123456" maxlength="6" autocomplete="one-time-code" inputmode="numeric" required>
          </div>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary btn-block">
          <span class="material-symbols-outlined">login</span>
          Ingresar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
